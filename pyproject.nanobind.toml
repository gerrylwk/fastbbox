[build-system]
requires = ["scikit-build-core>=0.5.0", "nanobind>=1.0.0", "numpy>=1.19.0"]
build-backend = "scikit_build_core.build"

[project]
name = "fastbbox-nanobind"
version = "0.1.0"
description = "Fast IoU/overlap computations for bounding boxes using nanobind"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Gerry Lim", email = "gerrylimwk@gmail.com"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: C++",
    "Topic :: Scientific/Engineering",
]
requires-python = ">=3.9"
dependencies = [
    "numpy>=1.19.0",
]

[project.urls]
Homepage = "https://github.com/gerrylwk/fastbbox"
Repository = "https://github.com/gerrylwk/fastbbox"
Issues = "https://github.com/gerrylwk/fastbbox/issues"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "build>=0.10",
    "scikit-build-core>=0.5.0",
    "nanobind>=1.0.0",
    "cmake>=3.15",
]

[tool.scikit-build]
# Specify CMake source directory
cmake.source-dir = "."
# Build directory
build-dir = "build/{wheel_tag}"
# Ensure the fastbbox package is included
wheel.packages = ["fastbbox"]

[tool.cibuildwheel]
# Build for Python 3.9+
build = "cp39-* cp310-* cp311-* cp312-*"
# Skip 32-bit builds, PyPy, and musl
skip = "*-win32 *-manylinux_i686 *-musllinux_* pp*"

[tool.cibuildwheel.linux]
before-all = "yum install -y gcc-c++ cmake ninja-build || dnf install -y gcc-c++ cmake ninja-build"

[tool.cibuildwheel.windows]
before-build = "pip install delvewheel"
repair-wheel-command = "delvewheel repair -w {dest_dir} {wheel}"

[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]
